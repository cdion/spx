name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_NAMESPACE: ${{ github.repository_owner }}
      VM: ${{ secrets.VM }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install deploy tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y just podman

      - name: Log in to GHCR
        run: |
          printf '%s' '${{ secrets.GITHUB_TOKEN }}' | podman login ghcr.io --username '${{ github.actor }}' --password-stdin

      - name: Configure SSH
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' '${{ secrets.VM_SSH_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' '${{ secrets.VM_KNOWN_HOSTS }}' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Publish and promote images
        run: just release-prod

      - name: Deploy production tags
        run: just deploy
