name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just podman

      - name: Run CI
        run: just ci

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          test -n "$GHCR_USERNAME"
          test -n "$GHCR_TOKEN"
          printf '%s' "$GHCR_TOKEN" | podman login ghcr.io --username "$GHCR_USERNAME" --password-stdin

      - name: Publish and promote images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IMAGE_NAMESPACE: ${{ github.repository_owner }}
        run: just release-prod
